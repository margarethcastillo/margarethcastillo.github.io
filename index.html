<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marga's Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: #f5f3ef;
  overflow-x: hidden;
}

/* WRAPPER */
.wrapper {
  min-height: 100vh;
  padding: 40px;
  position: relative;
}

/* BACKGROUND */
.bg1 {
  position: absolute;
  width: 85%;
  height: 520px;
  background: #e9e5df;
  border-radius: 80px;
  top: 35%;
  left: 50%;
  transform: translateX(-50%);
}

.bg2 {
  position: absolute;
  width: 320px;
  height: 320px;
  background: #ece8e1;
  border-radius: 50%;
  top: 40px;
  right: 60px;
}

.bg3 {
  position: absolute;
  width: 260px;
  height: 260px;
  background: #ece8e1;
  border-radius: 50%;
  bottom: 40px;
  left: 60px;
}

/* PROFILE */
.profile {
  position: relative;
  z-index: 2;
  max-width: 1200px;
  margin: auto;
  display: flex;
  align-items: center;
  gap: 25px;
  background: #fff;
  padding: 30px 40px;
  border-radius: 25px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.08);
}

.pic {
  width: 100px;
  height: 100px;
  border-radius: 18px;
  border: 3px solid #d4af37;
  object-fit: cover;
}

.profile h2 {
  font-size: 26px;
}

.profile span {
  color: #b8962e;
}

.role {
  font-size: 14px;
  color: #777;
}

/* MAIN */
.container {
  position: relative;
  z-index: 2;
  max-width: 1200px;
  margin: 40px auto;
  background: #fff;
  border-radius: 30px;
  padding: 50px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.08);
}

/* ABOUT */
.about {
  font-size: 18px;
  color: #444;
  line-height: 1.8;
  margin-bottom: 30px;
}

/* MENU */
.menu {
  display: flex;
  gap: 15px;
  background: #f1efec;
  padding: 12px;
  border-radius: 18px;
  margin-bottom: 30px;
}

.menu-item {
  flex: 1;
  text-align: center;
  padding: 15px;
  border-radius: 14px;
  cursor: pointer;
  transition: 0.3s;
}

.menu-item:hover {
  background: #e6e2db;
}

.menu-item.active {
  background: #d8c38a;
  color: #5a4a1f;
  font-weight: 500;
}

/* CONTENT */
.content {
  display: grid;
  gap: 15px;
}

/* CARD */
.card {
  background: #f9f8f6;
  padding: 20px;
  border-radius: 15px;
  transition: 0.3s;
  cursor: pointer;
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

/* SECTION (NEW) */
.section {
  background: #f9f8f6;
  padding: 25px;
  border-radius: 15px;
  transition: 0.3s;
}

.section:hover {
  transform: translateY(-5px);
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.section h2 {
  margin-bottom: 15px;
  color: #5a4a1f;
}

/* BUTTON */
.btn {
  display: inline-block;
  padding: 12px 20px;
  background: #d4af37;
  color: white;
  text-decoration: none;
  border-radius: 10px;
  transition: 0.3s;
}

.btn:hover {
  background: #b8962e;
}

/* MODAL */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 10;
}

.modal-content {
  background: #fff;
  padding: 30px;
  border-radius: 20px;
  width: 90%;
  max-width: 400px;
}

.close {
  float: right;
  font-size: 22px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="wrapper">

  <div class="bg1"></div>
  <div class="bg2"></div>
  <div class="bg3"></div>

  <!-- PROFILE -->
  <div class="profile">
    <img src="me.jpeg" class="pic">
    <div>
      <h2>Hi, I'm <span>Marga</span></h2>
      <div class="role">developer • student</div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="container">

    <div class="about">
      <b>ABOUT ME</b><br>
      I'm an Information Technology student passionate about building websites and creating clean, user-friendly designs.
    </div>

    <div class="menu">
      <div class="menu-item active" onclick="showContent('experience', this)">experience</div>
      <div class="menu-item" onclick="showContent('skills', this)">skills</div>
      <div class="menu-item" onclick="showContent('projects', this)">projects</div>
      <div class="menu-item" onclick="showContent('activity', this)">activity</div>
      <div class="menu-item" onclick="showContent('contact', this)">contact</div>
    </div>

    <div id="content" class="content"></div>

  </div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>
    <h3 id="modal-title"></h3>
    <p id="modal-desc"></p>
  </div>
</div>

<script>
function showContent(section, el) {
  const content = document.getElementById("content");

  document.querySelectorAll('.menu-item').forEach(item => {
    item.classList.remove('active');
  });

  el.classList.add('active');

  let html = "";

  if (section === "experience") {
    html = `
      <div class="card">👩🏻‍💼 IT Student – Studying Web Development</div>
      <div class="card">💻 Completed 2 system projects with front-end and back-end</div>
    `;
  } 
  else if (section === "skills") {
    html = `
      <div class="card">HTML</div>
      <div class="card">CSS</div>
      <div class="card">JavaScript</div>
    `;
  } 
  else if (section === "projects") {
    html = `
      <div class="card" onclick="openModal('TopUpHub System','A web-based top-up platform for games.')">TopUpHub System</div>
      <div class="card" onclick="openModal('Wildlife ConSight PH','A wildlife awareness website project.')">Wildlife ConSight PH</div>
    `;
  } 
  else if (section === "activity") {
    html = `
      <div class="section">
        <h2>Activity</h2>
        <a href="A02/index-1.html" class="btn">
          View Assignment A02
        </a>
      </div>
    `;
  }
  else if (section === "contact") {
    html = `
      <div class="card">📧 margarethcastillo938@gmail.com</div>
      <div class="card">📱 09062000589</div>
    `;
  }

  content.innerHTML = html;
}

/* MODAL */
function openModal(title, desc) {
  document.getElementById("modal").style.display = "flex";
  document.getElementById("modal-title").innerText = title;
  document.getElementById("modal-desc").innerText = desc;
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

/* AUTO LOAD */
window.onload = function() {
  showContent('experience', document.querySelector('.menu-item'));
};
</script>

</body>
</html>
